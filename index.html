<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION CONTROL // JARVIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00e5ff;
            --cyan-dim: #00e5ff18;
            --cyan-glow: #00e5ff70;
            --blue: #0066ff;
            --gold: #ffb700;
            --gold-dim: #ffb70018;
            --red: #ff3d3d;
            --green: #00ff88;
            --purple: #a855f7;
            --bg: #020a14;
            --bg2: #03101e;
            --panel: #030e1c;
            --panel2: #041226;
            --border: #0b2540;
            --border-glow: #00e5ff30;
            --text: #8ab8d8;
            --text-dim: #3a6080;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Deep space grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse at 15% 40%, #0044ff06 0%, transparent 55%),
                radial-gradient(ellipse at 85% 15%, #00e5ff04 0%, transparent 45%),
                radial-gradient(ellipse at 60% 90%, #a855f705 0%, transparent 40%),
                linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 60px 60px, 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Scan line */
        .scanline {
            position: fixed;
            top: -4px; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent 0%, var(--cyan) 15%, rgba(0,229,255,0.8) 50%, var(--cyan) 85%, transparent 100%);
            opacity: 0;
            filter: blur(1px);
            animation: scan 8s linear infinite;
            z-index: 9999;
            pointer-events: none;
        }
        @keyframes scan {
            0%   { top: -4px; opacity: 0; }
            5%   { opacity: 0.5; }
            95%  { opacity: 0.3; }
            100% { top: 100vh; opacity: 0; }
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px 30px 40px;
            position: relative;
            z-index: 1;
        }

        /* ═══════════ HEADER ═══════════ */
        header {
            text-align: center;
            padding: 40px 0 20px;
            position: relative;
        }

        .header-rings {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid var(--cyan);
            opacity: 0.12;
            pointer-events: none;
        }
        .ring-1 { width: 650px; height: 650px; border-style: dashed; animation: rot 40s linear infinite; }
        .ring-2 { width: 520px; height: 520px; animation: rot 25s linear infinite reverse; opacity: 0.08; }
        .ring-3 { width: 780px; height: 780px; border-style: dotted; animation: rot 60s linear infinite; opacity: 0.05; }
        @keyframes rot { to { transform: translate(-50%, -50%) rotate(360deg); } }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.6rem;
            font-weight: 900;
            color: var(--cyan);
            letter-spacing: 14px;
            text-shadow:
                0 0 8px var(--cyan),
                0 0 25px var(--cyan-glow),
                0 0 60px rgba(0,229,255,0.15);
            animation: hglow 3s ease-in-out infinite alternate;
            position: relative;
            z-index: 1;
        }
        @keyframes hglow {
            from { text-shadow: 0 0 8px var(--cyan), 0 0 25px var(--cyan-glow); }
            to   { text-shadow: 0 0 15px var(--cyan), 0 0 45px var(--cyan-glow), 0 0 90px rgba(0,229,255,0.12); }
        }

        .header-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 10px auto;
            max-width: 600px;
        }
        .header-divider::before, .header-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan));
            opacity: 0.4;
        }
        .header-divider::after { background: linear-gradient(90deg, var(--cyan), transparent); }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 6px;
        }

        .timestamp {
            font-size: 0.72rem;
            color: var(--cyan);
            opacity: 0.65;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .sys-bar {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-top: 14px;
        }
        .sys-item {
            font-size: 0.6rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 7px;
            letter-spacing: 1.5px;
        }
        .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
        }
        .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); animation: dpulse 2.4s ease-in-out infinite; }
        .dot.amber { background: var(--gold); box-shadow: 0 0 6px var(--gold); animation: dpulse 1.8s ease-in-out infinite; }
        .dot.cyan  { background: var(--cyan);  box-shadow: 0 0 6px var(--cyan);  animation: dpulse 3s ease-in-out infinite; }
        @keyframes dpulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ═══════════ GRID ═══════════ */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 24px;
        }

        /* ═══════════ PANELS ═══════════ */
        .panel {
            background: linear-gradient(145deg, var(--panel) 0%, var(--panel2) 100%);
            border: 1px solid var(--border);
            padding: 22px 24px;
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 22px 100%, 0 calc(100% - 22px));
        }
        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--cyan) 25%, var(--cyan) 75%, transparent 100%);
            opacity: 0.6;
        }
        /* Top-right corner cut indicator */
        .panel::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            border-style: solid;
            border-width: 0 22px 22px 0;
            border-color: transparent var(--border-glow) transparent transparent;
        }
        .panel.full-width { grid-column: span 2; }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 3px;
        }
        .panel-title::before {
            content: '';
            display: block;
            width: 3px; height: 13px;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            flex-shrink: 0;
        }
        .panel-id {
            margin-left: auto;
            font-size: 0.52rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* ═══════════ AGENTS ═══════════ */
        .agent-list { display: flex; flex-direction: column; gap: 10px; }

        .agent-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-left: 2px solid var(--a-color, var(--cyan));
            padding: 13px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.25s ease;
            clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
            box-shadow: -2px 0 12px -4px var(--a-color, var(--cyan));
        }
        .agent-card:hover {
            border-color: var(--a-color, var(--cyan));
            box-shadow: -2px 0 12px -4px var(--a-color, var(--cyan)), 0 0 20px var(--cyan-dim), inset 0 0 15px var(--cyan-dim);
            transform: translateX(4px);
        }

        .agent-info { display: flex; align-items: center; gap: 14px; }

        .agent-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700; font-size: 1.1rem;
            flex-shrink: 0;
            position: relative;
        }
        .agent-avatar::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px dashed currentColor;
            opacity: 0.35;
            animation: arot 6s linear infinite;
        }
        @keyframes arot { to { transform: rotate(360deg); } }

        .agent-name { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.9rem; }
        .agent-role { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; letter-spacing: 1px; }
        .agent-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .tag {
            font-size: 0.52rem; padding: 2px 8px;
            background: var(--border);
            border: 1px solid var(--border-glow);
            color: var(--text-dim);
            letter-spacing: 1px;
            clip-path: polygon(5px 0, 100% 0, calc(100% - 5px) 100%, 0 100%);
        }

        .status-hud { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .status-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.58rem;
            padding: 4px 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(5px 0, 100% 0, calc(100% - 5px) 100%, 0 100%);
        }
        .status-badge.online  { background: #00ff8812; color: var(--green); border: 1px solid var(--green); animation: sbglow 2s ease-in-out infinite alternate; }
        .status-badge.standby { background: #ffb70012; color: var(--gold);  border: 1px solid var(--gold); }
        .status-badge.offline { background: #ff3d3d12; color: var(--red);   border: 1px solid var(--red); }
        @keyframes sbglow {
            from { box-shadow: 0 0 4px #00ff8830; }
            to   { box-shadow: 0 0 12px #00ff8870; }
        }
        .status-sub {
            font-size: 0.52rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-sub .dot { width: 4px; height: 4px; }

        /* ═══════════ COSTS ═══════════ */
        .cost-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .cost-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .cost-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--cyan-dim) 0%, transparent 70%);
        }
        .cost-label {
            font-size: 0.58rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .cost-ring-wrap {
            display: flex;
            justify-content: center;
            margin: 8px 0;
            position: relative;
        }
        .cost-ring-wrap svg { width: 90px; height: 90px; transform: rotate(-90deg); }
        .cost-inner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
        }
        .cost-period {
            font-size: 0.58rem;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* ═══════════ ORG NETWORK ═══════════ */
        .org-wrap {
            width: 100%;
            height: 320px;
        }
        .org-wrap svg {
            width: 100%;
            height: 100%;
        }

        /* ═══════════ BRIEFS ═══════════ */
        .brief-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 420px;
            overflow-y: auto;
        }
        .brief-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-left: 2px solid var(--gold);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.25s ease;
            clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
            box-shadow: -2px 0 10px -4px var(--gold);
        }
        .brief-card:hover {
            border-color: var(--gold);
            box-shadow: -2px 0 10px -4px var(--gold), 0 0 18px var(--gold-dim), inset 0 0 12px var(--gold-dim);
        }
        .brief-body { flex: 1; padding-left: 10px; }
        .brief-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 4px;
        }
        .brief-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: #d8eeff;
        }
        .brief-date {
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-left: auto;
            white-space: nowrap;
        }
        .brief-topics { display: flex; gap: 5px; flex-wrap: wrap; }
        .topic {
            font-size: 0.52rem;
            padding: 2px 8px;
            background: var(--border);
            border: 1px solid var(--cyan-dim);
            color: var(--cyan);
            clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
            letter-spacing: 0.5px;
        }

        /* Score ring */
        .score-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding-left: 18px;
            flex-shrink: 0;
        }
        .score-ring-el { position: relative; width: 58px; height: 58px; }
        .score-ring-el svg { transform: rotate(-90deg); width: 58px; height: 58px; }
        .score-num {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.05rem;
            font-weight: 900;
        }
        .score-denom { font-size: 0.5rem; color: var(--text-dim); letter-spacing: 1px; }

        .no-briefs {
            text-align: center;
            color: var(--text-dim);
            padding: 40px;
            font-size: 0.75rem;
            letter-spacing: 2px;
        }

        /* ═══════════ SCROLLBAR ═══════════ */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

        /* ═══════════ RESPONSIVE ═══════════ */
        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; }
            .panel.full-width { grid-column: span 1; }
            h1 { font-size: 2rem; letter-spacing: 6px; }
            .ring { display: none; }
            .sys-bar { flex-wrap: wrap; gap: 14px; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">

        <header>
            <div class="header-rings">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
                <h1>MISSION CONTROL</h1>
            </div>
            <div class="header-divider">
                <span class="subtitle">AGENT SYSTEM // J.A.R.V.I.S HUD v2.0</span>
            </div>
            <p class="timestamp" id="timestamp"></p>
            <div class="sys-bar">
                <div class="sys-item"><div class="dot green"></div> SYSTEM ONLINE</div>
                <div class="sys-item"><div class="dot cyan"></div> 3 AGENTS LOADED</div>
                <div class="sys-item"><div class="dot" id="gw-dot" style="background:#ffb700;box-shadow:0 0 6px #ffb700"></div> <span id="gw-label">GATEWAY CONNECTING</span></div>
                <div class="sys-item"><div class="dot green"></div> MESH ACTIVE</div>
            </div>
            <div id="device-banner" style="display:none;margin-top:12px;background:#030e1c;border:1px solid #ffb700;padding:10px 20px;font-size:0.65rem;color:#ffb700;letter-spacing:1px;max-width:700px;margin-left:auto;margin-right:auto;">
                ⚠ DEVICE APPROVAL REQUIRED — SSH into your VPS and run:<br>
                <span id="device-cmd" style="color:#00e5ff;font-family:'JetBrains Mono',monospace;display:block;margin-top:6px;word-break:break-all"></span>
            </div>
        </header>

        <div class="dashboard">

            <div class="panel">
                <div class="panel-title">AGENT STATUS <span class="panel-id">SYS:001</span></div>
                <div class="agent-list" id="agent-list"></div>
            </div>

            <div class="panel">
                <div class="panel-title">API COSTS <span class="panel-id">SYS:002</span></div>
                <div class="cost-grid" id="cost-grid"></div>
            </div>

            <div class="panel full-width">
                <div class="panel-title">NETWORK TOPOLOGY — DISTRIBUTED MESH <span class="panel-id">SYS:003</span></div>
                <div class="org-wrap" id="org-wrap"></div>
            </div>

            <div class="panel full-width">
                <div class="panel-title">DAILY BRIEFS <span class="panel-id">SYS:004</span></div>
                <div class="brief-list" id="brief-list"></div>
            </div>

        </div>
    </div>

    <script>
        /* ── Timestamp (Paris) ── */
        function updateTimestamp() {
            const opts = {
                weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Europe/Paris'
            };
            document.getElementById('timestamp').textContent =
                '⬡ ' + new Date().toLocaleDateString('en-US', opts) + ' // PARIS';
        }
        updateTimestamp();
        setInterval(updateTimestamp, 1000);

        /* ── Colors ── */
        const COLORS = { Jarvis: '#a855f7', Scout: '#00e5ff', Quill: '#00ff88' };
        const gc = name => COLORS[name] || '#00e5ff';

        function scoreColor(s) {
            if (s == null || s === '' || s === '-') return '#3a6080';
            if (s >= 8) return '#00ff88';
            if (s >= 5) return '#ffb700';
            return '#ff3d3d';
        }

        /* ── Fetch all ── */
        async function fetchAll() {
            try {
                const [agents, costs, org, briefs] = await Promise.all([
                    fetch('/api/agents').then(r => r.json()),
                    fetch('/api/costs').then(r => r.json()),
                    fetch('/api/org').then(r => r.json()),
                    fetch('/api/briefs').then(r => r.json())
                ]);
                renderAgents(agents);
                renderCosts(costs);
                renderOrg(org);
                renderBriefs(briefs);
            } catch (e) { console.error('Fetch error:', e); }
        }

        /* ── Agents ── */
        function renderAgents(agents) {
            document.getElementById('agent-list').innerHTML = agents.map(a => {
                const c = a.color || gc(a.name);
                const st = a.status || 'standby';
                const dc = st === 'online' ? '#00ff88' : st === 'standby' ? '#ffb700' : '#ff3d3d';
                const tags = (a.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
                const sessions = a.sessions != null ? `<span class="tag" style="opacity:.6">${a.sessions} sessions</span>` : '';
                return `
                <div class="agent-card" style="--a-color:${c}">
                    <div class="agent-info">
                        <div class="agent-avatar" style="background:${c}14;border:1.5px solid ${c};color:${c}">${(a.name||'?').charAt(0)}</div>
                        <div>
                            <div class="agent-name" style="color:${c}">${a.name||'Unknown'}</div>
                            <div class="agent-role">${a.role||'Agent'}</div>
                            <div class="agent-tags">${tags}${sessions}</div>
                        </div>
                    </div>
                    <div class="status-hud">
                        <span class="status-badge ${st}">${st}</span>
                        <div class="status-sub">
                            <div class="dot" style="background:${dc};box-shadow:0 0 5px ${dc}"></div>
                            ${st.toUpperCase()}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        /* ── Costs ── */
        function renderCosts(costs) {
            const fmt = v => (typeof v === 'number' ? `$${v.toFixed(2)}` : v);
            document.getElementById('cost-grid').innerHTML = `
            <div class="cost-card">
                <div class="cost-label">Monthly Total</div>
                <div class="cost-ring-wrap">
                    <svg viewBox="0 0 90 90">
                        <circle cx="45" cy="45" r="35" fill="none" stroke="#0b2540" stroke-width="6"/>
                        <circle cx="45" cy="45" r="35" fill="none" stroke="#00e5ff" stroke-width="6"
                            stroke-dasharray="220" stroke-dashoffset="210" stroke-linecap="round"
                            style="filter:drop-shadow(0 0 5px #00e5ff)"/>
                    </svg>
                    <div class="cost-inner" style="color:#00e5ff">${fmt(costs.monthly_total)}</div>
                </div>
                <div class="cost-period">${costs.currency} • ${costs.month}</div>
            </div>
            <div class="cost-card">
                <div class="cost-label">Today's Spend</div>
                <div class="cost-ring-wrap">
                    <svg viewBox="0 0 90 90">
                        <circle cx="45" cy="45" r="35" fill="none" stroke="#0b2540" stroke-width="6"/>
                        <circle cx="45" cy="45" r="35" fill="none" stroke="#ffb700" stroke-width="6"
                            stroke-dasharray="220" stroke-dashoffset="216" stroke-linecap="round"
                            style="filter:drop-shadow(0 0 5px #ffb700)"/>
                    </svg>
                    <div class="cost-inner" style="color:#ffb700">${fmt(costs.daily_spend)}</div>
                </div>
                <div class="cost-period">${costs.currency}</div>
            </div>`;
        }

        /* ── Org — Distributed Mesh Network ── */
        function renderOrg(org) {
            const wrap = document.getElementById('org-wrap');
            const W = 1200, H = 320;
            const agents = org.agents;
            const n = agents.length;
            const cx = W / 2, cy = H / 2;
            const R = Math.min(W * 0.3, H * 0.36);

            // Positions in a circle — equal rank, no hierarchy
            const pos = agents.map((_, i) => ({
                x: cx + R * Math.cos((2 * Math.PI * i / n) - Math.PI / 2),
                y: cy + R * Math.sin((2 * Math.PI * i / n) - Math.PI / 2)
            }));

            // Mesh lines (all-to-all)
            let mesh = '';
            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    const mx = (pos[i].x + pos[j].x) / 2;
                    const my = (pos[i].y + pos[j].y) / 2;
                    mesh += `<line x1="${pos[i].x}" y1="${pos[i].y}" x2="${pos[j].x}" y2="${pos[j].y}"
                        stroke="#0b2540" stroke-width="1.5"/>`;
                    mesh += `<circle cx="${mx}" cy="${my}" r="2.5" fill="#00e5ff" opacity="0.5"
                        style="filter:drop-shadow(0 0 4px #00e5ff)"/>`;
                }
            }

            // Spokes to center hub
            const spokes = pos.map(p =>
                `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="#00e5ff06" stroke-width="1" stroke-dasharray="5 7"/>`
            ).join('');

            // Central hub
            const hub = `
                <circle cx="${cx}" cy="${cy}" r="20" fill="#00e5ff06" stroke="#00e5ff" stroke-width="1"
                    stroke-dasharray="3 5" opacity="0.4">
                    <animateTransform attributeName="transform" type="rotate"
                        from="0 ${cx} ${cy}" to="360 ${cx} ${cy}" dur="15s" repeatCount="indefinite"/>
                </circle>
                <circle cx="${cx}" cy="${cy}" r="5" fill="#00e5ff" opacity="0.7"
                    style="filter:drop-shadow(0 0 8px #00e5ff)"/>
                <text x="${cx}" y="${cy + 36}" text-anchor="middle"
                    font-family="Orbitron,sans-serif" font-size="8" fill="#00e5ff" opacity="0.45" letter-spacing="3">MESH</text>`;

            // Agent nodes
            const nodes = agents.map((a, i) => {
                const p = pos[i];
                const c = a.color || gc(a.name);
                // Label placement: push outward from center
                const dx = p.x - cx, dy = p.y - cy;
                const labelDist = 52, roleDist = 65;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const lx = p.x + (dx / len) * labelDist;
                const ly = p.y + (dy / len) * labelDist;
                const rx = p.x + (dx / len) * roleDist;
                const ry = p.y + (dy / len) * roleDist;

                return `
                <g>
                    <!-- Outer dashed ring -->
                    <circle cx="${p.x}" cy="${p.y}" r="44" fill="none" stroke="${c}" stroke-width="0.8"
                        stroke-dasharray="4 6" opacity="0.25">
                        <animateTransform attributeName="transform" type="rotate"
                            from="0 ${p.x} ${p.y}" to="360 ${p.x} ${p.y}" dur="12s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Solid border ring -->
                    <circle cx="${p.x}" cy="${p.y}" r="36" fill="none" stroke="${c}"
                        stroke-width="1.5" opacity="0.35"/>
                    <!-- Node fill -->
                    <circle cx="${p.x}" cy="${p.y}" r="30" fill="${c}14" stroke="${c}" stroke-width="2"
                        style="filter:drop-shadow(0 0 10px ${c})"/>
                    <!-- Initial -->
                    <text x="${p.x}" y="${p.y + 7}" text-anchor="middle"
                        font-family="Orbitron,sans-serif" font-size="18" font-weight="700"
                        fill="${c}">${a.name.charAt(0)}</text>
                    <!-- Name -->
                    <text x="${lx}" y="${ly + 4}" text-anchor="middle"
                        font-family="Orbitron,sans-serif" font-size="11" font-weight="700"
                        fill="${c}">${a.name}</text>
                    <!-- Role -->
                    <text x="${rx}" y="${ry + 4}" text-anchor="middle"
                        font-family="JetBrains Mono,monospace" font-size="9"
                        fill="#3a6080">${a.role}</text>
                    ${a.note ? `<text x="${rx}" y="${ry + 17}" text-anchor="middle"
                        font-family="JetBrains Mono,monospace" font-size="8"
                        fill="${c}" opacity="0.55">${a.note}</text>` : ''}
                </g>`;
            }).join('');

            wrap.innerHTML = `
                <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"
                    xmlns="http://www.w3.org/2000/svg">
                    ${spokes}
                    ${mesh}
                    ${hub}
                    ${nodes}
                </svg>`;
        }

        /* ── Briefs ── */
        function renderBriefs(briefs) {
            const el = document.getElementById('brief-list');
            if (!briefs.length) {
                el.innerHTML = '<div class="no-briefs">[ NO BRIEFS AVAILABLE — AWAITING TRANSMISSION ]</div>';
                return;
            }
            el.innerHTML = briefs.map(b => {
                const s = b.score;
                const hasScore = s != null && s !== '' && s !== '-';
                const sc = scoreColor(s);
                // Circumference of r=24 ≈ 150.8
                const circ = 150.8;
                const offset = hasScore ? circ * (1 - s / 10) : circ;
                return `
                <div class="brief-card">
                    <div class="brief-body">
                        <div class="brief-row">
                            <div class="brief-title">${b.title || 'UNTITLED BRIEF'}</div>
                            <div class="brief-date">${b.date}</div>
                        </div>
                        <div class="brief-topics">
                            ${(b.topics || []).map(t => `<span class="topic">${t}</span>`).join('')}
                        </div>
                    </div>
                    <div class="score-wrap">
                        <div class="score-ring-el">
                            <svg viewBox="0 0 58 58">
                                <circle cx="29" cy="29" r="24" fill="none" stroke="#0b2540" stroke-width="4"/>
                                <circle cx="29" cy="29" r="24" fill="none" stroke="${sc}" stroke-width="4"
                                    stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
                                    stroke-linecap="round"
                                    style="filter:drop-shadow(0 0 4px ${sc})"/>
                            </svg>
                            <div class="score-num" style="color:${sc}">${hasScore ? s : '–'}</div>
                        </div>
                        <div class="score-denom">/ 10</div>
                    </div>
                </div>`;
            }).join('');
        }

        /* ── Gateway status ── */
        function updateGateway(status, deviceId, requestId) {
            const dot   = document.getElementById('gw-dot');
            const label = document.getElementById('gw-label');
            const banner = document.getElementById('device-banner');
            const cmd    = document.getElementById('device-cmd');
            const map = {
                online:         { color: '#00ff88', text: 'GATEWAY ONLINE' },
                authenticating: { color: '#00e5ff', text: 'AUTHENTICATING' },
                reconnecting:   { color: '#ffb700', text: 'RECONNECTING' },
                connecting:     { color: '#ffb700', text: 'GATEWAY CONNECTING' },
                error:          { color: '#ff3d3d', text: 'GATEWAY ERROR' },
                disconnected:   { color: '#ff3d3d', text: 'DISCONNECTED' },
            };
            const s = map[status] || { color: '#ffb700', text: status.toUpperCase() };
            dot.style.background  = s.color;
            dot.style.boxShadow   = `0 0 6px ${s.color}`;
            label.textContent     = s.text;

            if (status === 'authenticating' && requestId) {
                banner.style.display = 'block';
                cmd.textContent = `docker exec -e OPENCLAW_TOKEN=Brc7fwR3YtzZUvqhxtXPNvOwN7QfKI1d openclaw-ixgy-openclaw-1 openclaw devices approve ${requestId}`;
            } else if (status === 'online') {
                banner.style.display = 'none';
            }
        }

        /* ── SSE real-time stream ── */
        function connectSSE() {
            const es = new EventSource('/api/stream');
            es.onmessage = (e) => {
                if (!e.data || e.data.startsWith(':')) return;
                try {
                    const d = JSON.parse(e.data);
                    if (d.type === 'init') {
                        renderAgents(d.agents);
                        renderCosts(d.costs);
                        renderOrg(d.org);
                        updateGateway(d.gateway, d.device_id);
                    } else if (d.type === 'agents') {
                        renderAgents(d.payload);
                    } else if (d.type === 'costs') {
                        renderCosts(d.payload);
                    } else if (d.type === 'new_brief') {
                        fetch('/api/briefs').then(r => r.json()).then(renderBriefs);
                    } else if (d.type === 'gateway_status') {
                        updateGateway(d.status, d.device_id, d.request_id);
                    }
                } catch(err) { console.error('SSE parse error', err); }
            };
            es.onerror = () => {
                es.close();
                setTimeout(connectSSE, 5000);
            };
        }

        fetchAll();
        connectSSE();
    </script>
</body>
</html>
