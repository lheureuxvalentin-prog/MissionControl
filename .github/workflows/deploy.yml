name: Deploy MissionControl

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger webhook deploy
        run: |
          curl -sf -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            https://mc.srv1495549.hstgr.cloud/api/deploy
          echo "Deploy triggered!"
