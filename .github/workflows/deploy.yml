name: Deploy MissionControl

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: srv1495549.hstgr.cloud
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            cd /docker/openclaw-ixgy/data/.openclaw/workspace/MissionControl
            git pull origin main
            docker compose up --build -d
            echo "Deploy complete"
